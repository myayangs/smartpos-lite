name: CI/CD SmartPOS Lite

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, zip, gd, curl
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel environment for CI
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install Node dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

      - name: Validate Composer file
        run: composer validate --no-check-publish

      - name: Clear Laravel caches
        run: php artisan optimize:clear

      - name: Validate Laravel routes
        run: php artisan route:list

      - name: Validate migration status
        run: php artisan migrate:status || true

      - name: Run Laravel tests if available
        run: php artisan test || true

      - name: Deploy to CentOS VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            git config --global --add safe.directory /var/www/smartpos-lite

            cd /var/www/smartpos-lite

            git fetch origin main
            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader --no-interaction
            npm install
            npm run build

            php artisan migrate --force
            php artisan storage:link || true
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            chown -R nginx:nginx /var/www/smartpos-lite/storage /var/www/smartpos-lite/bootstrap/cache
            chmod -R 775 /var/www/smartpos-lite/storage /var/www/smartpos-lite/bootstrap/cache

            systemctl restart php-fpm
            systemctl reload nginx
